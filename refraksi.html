<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulasi Pembiasan Cahaya Pro</title>
    <style>
        :root {
            --bg-color: #1a1a24;
            --panel-color: #2a2a3a;
            --text-color: #ffffff;
            --accent-color: #00adb5;
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-wrapper {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            font-size: 1.1rem;
            text-align: center;
            margin: 10px 0;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .canvas-container {
            width: 100%;
            touch-action: none;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 4 / 3;
        }

        .control-section {
            background: var(--panel-color);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .control-group {
            background: rgba(255, 255, 255, 0.05);
            padding: 12px;
            border-radius: 8px;
        }

        .label-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .n-badge {
            background: var(--accent-color);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 0.85rem;
        }

        input[type="range"] {
            width: 100%;
            height: 30px;
            accent-color: var(--accent-color);
        }

        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 8px;
            text-align: center;
        }

        .data-item {
            font-size: 0.7rem;
            font-family: monospace;
            color: #ccc;
        }

        .data-item b {
            display: block;
            font-size: 0.9rem;
            color: #fff;
            margin-top: 3px;
        }

        .help-text {
            font-size: 0.75rem;
            color: #00adb5;
            text-align: center;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <h1>Simulasi Optik: Pembiasan</h1>

        <div class="canvas-container">
            <canvas id="simCanvas" width="800" height="600"></canvas>
        </div>

        <div class="control-section">
            <div class="control-group">
                <div class="label-row">
                    <span>Medium 1: <b id="m1-name">Udara</b></span>
                    <span class="n-badge">n₁ = <span id="n1-val">1.00</span></span>
                </div>
                <input type="range" id="n1-slider" min="1.0" max="2.5" step="0.01" value="1.00">
            </div>

            <div class="control-group">
                <div class="label-row">
                    <span>Medium 2: <b id="m2-name">Kaca</b></span>
                    <span class="n-badge">n₂ = <span id="n2-val">1.50</span></span>
                </div>
                <input type="range" id="n2-slider" min="1.0" max="2.5" step="0.01" value="1.50">
            </div>

            <div class="data-grid">
                <div class="data-item">Sudut Datang<b id="data-theta1">0.0°</b></div>
                <div class="data-item">Sudut Bias<b id="data-theta2">0.0°</b></div>
                <div class="data-item">Sudut Pantul<b id="data-reflect">0.0°</b></div>
            </div>

            <p class="help-text">● Geser lingkaran pada laser untuk memutar sinar</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const n1Slider = document.getElementById('n1-slider');
        const n2Slider = document.getElementById('n2-slider');
        const n1Val = document.getElementById('n1-val');
        const n2Val = document.getElementById('n2-val');
        const m1Name = document.getElementById('m1-name');
        const m2Name = document.getElementById('m2-name');
        const dataTheta1 = document.getElementById('data-theta1');
        const dataTheta2 = document.getElementById('data-theta2');
        const dataReflect = document.getElementById('data-reflect');

        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        let laserRadius = 250; 
        let laserAngle = Math.PI + Math.PI / 4; 
        let isDragging = false;

        function getMaterial(n) {
            if (n <= 1.01) return "Udara";
            if (n <= 1.33) return "Air";
            if (n <= 1.50) return "Kaca";
            if (n <= 2.42) return "Intan";
            return "Custom";
        }

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function handleStart(e) {
            const pos = getPos(e);
            const lx = centerX + laserRadius * Math.cos(laserAngle);
            const ly = centerY + laserRadius * Math.sin(laserAngle);
            if (Math.hypot(pos.x - lx, pos.y - ly) < 50) isDragging = true;
        }

        function handleMove(e) {
            if (!isDragging) return;
            if (e.cancelable) e.preventDefault();
            const pos = getPos(e);
            let angle = Math.atan2(pos.y - centerY, pos.x - centerX);
            if (angle > -0.05 && angle < Math.PI/2) angle = -0.05;
            if (angle >= Math.PI/2 && angle < Math.PI + 0.05) angle = Math.PI + 0.05;
            laserAngle = angle;
            draw();
        }

        canvas.addEventListener('mousedown', handleStart);
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('mouseup', () => isDragging = false);
        canvas.addEventListener('touchstart', handleStart, {passive: false});
        window.addEventListener('touchmove', handleMove, {passive: false});
        window.addEventListener('touchend', () => isDragging = false);

        function draw() {
            const n1 = parseFloat(n1Slider.value);
            const n2 = parseFloat(n2Slider.value);
            
            n1Val.innerText = n1.toFixed(2);
            n2Val.innerText = n2.toFixed(2);
            m1Name.innerText = getMaterial(n1);
            m2Name.innerText = getMaterial(n2);

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Mediums
            ctx.fillStyle = "#1e293b"; 
            ctx.fillRect(0, 0, canvas.width, centerY);
            ctx.fillStyle = `rgba(0, 173, 181, ${Math.min(0.1 + (n2 - 1) * 0.3, 0.45)})`;
            ctx.fillRect(0, centerY, canvas.width, centerY);

            // Labels on Canvas
            ctx.fillStyle = "rgba(255,255,255,0.7)";
            ctx.font = "bold 20px Arial";
            ctx.fillText(`n₁ = ${n1.toFixed(2)}`, 20, 40);
            ctx.fillText(`n₂ = ${n2.toFixed(2)}`, 20, canvas.height - 30);

            // Normal line
            ctx.setLineDash([10, 10]); ctx.strokeStyle = "rgba(255,255,255,0.2)";
            ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); ctx.stroke();
            ctx.setLineDash([]);
            
            // Interface line
            ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); ctx.stroke();

            // Physics
            let theta1 = Math.abs(laserAngle - (-Math.PI / 2));
            if (laserAngle > -Math.PI / 2) theta1 = Math.abs(laserAngle + Math.PI / 2);
            
            const sinTheta2 = (n1 * Math.sin(theta1)) / n2;
            let tir = sinTheta2 > 1.0;
            let theta2 = tir ? 0 : Math.asin(sinTheta2);
            const fromLeft = laserAngle < -Math.PI / 2;

            dataTheta1.innerText = (theta1 * 180 / Math.PI).toFixed(1) + "°";
            dataReflect.innerText = (theta1 * 180 / Math.PI).toFixed(1) + "°";
            dataTheta2.innerText = tir ? "TIR" : (theta2 * 180 / Math.PI).toFixed(1) + "°";

            const lx = centerX + laserRadius * Math.cos(laserAngle);
            const ly = centerY + laserRadius * Math.sin(laserAngle);
            
            // 1. SINAR DATANG (Utama - Tebal)
            ctx.lineWidth = 4; ctx.shadowBlur = 10; ctx.shadowColor = "#ff3333"; ctx.strokeStyle = "#ff3333";
            ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(centerX, centerY); ctx.stroke();

            // 2. SINAR PANTUL (Tipis & Transparan)
            // Intensitas sangat rendah kecuali jika TIR (Total Internal Reflection)
            let reflectAlpha = tir ? 0.8 : 0.15; 
            ctx.shadowBlur = tir ? 10 : 0;
            ctx.lineWidth = 2; // Tipis saja
            ctx.strokeStyle = `rgba(255, 51, 51, ${reflectAlpha})`;
            const rAng = fromLeft ? -Math.PI/2 + theta1 : -Math.PI/2 - theta1;
            ctx.beginPath(); ctx.moveTo(centerX, centerY);
            ctx.lineTo(centerX + 400 * Math.cos(rAng), centerY + 400 * Math.sin(rAng)); ctx.stroke();

            // 3. SINAR BIAS (Utama - Tebal)
            if (!tir) {
                ctx.lineWidth = 4; ctx.shadowBlur = 10; ctx.strokeStyle = "#ff3333";
                const reAng = fromLeft ? Math.PI/2 - theta2 : Math.PI/2 + theta2;
                ctx.beginPath(); ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + 500 * Math.cos(reAng), centerY + 500 * Math.sin(reAng)); ctx.stroke();
            }
            
            // Laser Unit
            ctx.shadowBlur = 0;
            ctx.save();
            ctx.translate(lx, ly); ctx.rotate(laserAngle + Math.PI);
            ctx.fillStyle = "#475569"; ctx.fillRect(-25, -15, 50, 30);
            ctx.fillStyle = isDragging ? "#00adb5" : "#e11d48";
            ctx.beginPath(); ctx.arc(0, 0, 12, 0, 7); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
            ctx.restore();
        }

        [n1Slider, n2Slider].forEach(s => s.addEventListener('input', draw));
        draw();
    </script>
</body>

</html>
