<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulasi Interferensi Celah Ganda Young</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2d2d2d;
            --text-color: #ffffff;
            --accent-color: #00adb5;
        }

        body {
            margin: 0;
            padding: 10px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            margin-bottom: 5px;
            font-size: 20px;
            text-align: center;
            color: var(--accent-color);
        }

        p.subtitle {
            margin-top: 0;
            margin-bottom: 15px;
            color: #888;
            font-size: 12px;
            text-align: center;
        }

        .main-container {
            display: flex;
            flex-direction: column; /* Tombol & Slider otomatis di bawah canvas */
            gap: 15px;
            max-width: 800px;
            width: 100%;
            background: var(--panel-color);
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }

        .canvas-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        canvas {
            background: #000;
            border-radius: 8px;
            width: 100%; /* Membuat canvas responsif */
            height: auto;
            aspect-ratio: 14 / 9; /* Menjaga proporsi simulasi */
        }

        .playback-controls {
            display: flex;
            gap: 8px;
            justify-content: center;
            background: #222;
            padding: 8px;
            border-radius: 8px;
            flex-wrap: wrap;
        }

        .btn {
            background: #444;
            color: white;
            border: none;
            padding: 10px 14px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12px;
            transition: all 0.2s;
            flex: 1; /* Biar tombol bagi rata di HP */
            min-width: 80px;
        }

        .btn.active {
            background: var(--accent-color);
            color: #000;
        }

        .control-panel {
            background: #222;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }

        label span {
            color: var(--accent-color);
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 10px; /* Lebih tebal agar mudah digeser di HP */
            background: #444;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 22px; /* Lebih besar agar nyaman untuk jempol */
            height: 22px;
            background: var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
        }

        .data-display {
            background: #111;
            padding: 12px;
            border-radius: 6px;
            border-left: 4px solid var(--accent-color);
            font-family: monospace;
            font-size: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Membagi dua kolom di HP */
            gap: 5px;
        }

        .legend {
            font-size: 11px;
            color: #aaa;
            line-height: 1.4;
            border-top: 1px solid #444;
            padding-top: 10px;
        }
    </style>
</head>
<body>

    <h1>Simulasi Lab Celah Ganda</h1>
    <p class="subtitle">Interferensi Cahaya Young</p>

    <div class="main-container">
        <div class="canvas-container">
            <canvas id="simCanvas" width="700" height="450"></canvas>
            
            <div class="playback-controls">
                <button id="btnPausePlay" class="btn active">⏸ Pause</button>
                <button id="btnNormal" class="btn active">Normal</button>
                <button id="btnSlow" class="btn">Slow</button>
            </div>
        </div>

        <div class="control-panel">
            <div class="control-group">
                <label>Panjang Gelombang (<span id="lambda-val">550</span> nm)</label>
                <input type="range" id="wavelength" min="400" max="700" value="550">
            </div>

            <div class="control-group">
                <label>Jarak Celah, d (<span id="d-val">25</span> &mu;m)</label>
                <input type="range" id="slitDistance" min="10" max="50" value="25">
            </div>

            <div class="control-group">
                <label>Jarak Layar, L (<span id="L-val">2.0</span> m)</label>
                <input type="range" id="screenDistance" min="1.0" max="3.0" step="0.1" value="2.0">
            </div>

            <div class="data-display">
                <div>&Delta;y: <span id="dy-val">0.00</span> mm</div>
                <div>Freq: <span id="freq-val">0.00</span> THz</div>
            </div>

            <div class="legend">
                <strong>Info:</strong> Semakin besar <b>L</b> atau <b>&lambda;</b>, jarak antar pita terang (<b>&Delta;y</b>) semakin lebar.
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        const wlInput = document.getElementById('wavelength');
        const dInput = document.getElementById('slitDistance');
        const LInput = document.getElementById('screenDistance');
        const lambdaVal = document.getElementById('lambda-val');
        const dVal = document.getElementById('d-val');
        const LVal = document.getElementById('L-val');
        const dyVal = document.getElementById('dy-val');
        const freqVal = document.getElementById('freq-val');

        const btnPausePlay = document.getElementById('btnPausePlay');
        const btnNormal = document.getElementById('btnNormal');
        const btnSlow = document.getElementById('btnSlow');

        let time = 0;
        let isPaused = false;
        let speedMultiplier = 0.2; 

        btnPausePlay.addEventListener('click', () => {
            isPaused = !isPaused;
            btnPausePlay.innerText = isPaused ? "▶ Play" : "⏸ Pause";
            btnPausePlay.classList.toggle('active', !isPaused);
        });

        btnNormal.addEventListener('click', () => {
            speedMultiplier = 0.2;
            btnNormal.classList.add('active');
            btnSlow.classList.remove('active');
        });

        btnSlow.addEventListener('click', () => {
            speedMultiplier = 0.04;
            btnSlow.classList.add('active');
            btnNormal.classList.remove('active');
        });

        function wavelengthToRGB(wavelength) {
            let r, g, b, alpha;
            if (wavelength >= 380 && wavelength < 440) {
                r = -((wavelength - 440) / (440 - 380)); g = 0.0; b = 1.0;
            } else if (wavelength >= 440 && wavelength < 490) {
                r = 0.0; g = (wavelength - 440) / (490 - 440); b = 1.0;
            } else if (wavelength >= 490 && wavelength < 510) {
                r = 0.0; g = 1.0; b = -((wavelength - 510) / (510 - 490));
            } else if (wavelength >= 510 && wavelength < 580) {
                r = (wavelength - 510) / (580 - 510); g = 1.0; b = 0.0;
            } else if (wavelength >= 580 && wavelength < 645) {
                r = 1.0; g = -((wavelength - 645) / (645 - 580)); b = 0.0;
            } else if (wavelength >= 645 && wavelength <= 780) {
                r = 1.0; g = 0.0; b = 0.0;
            } else {
                r = 0.0; g = 0.0; b = 0.0;
            }
            alpha = (wavelength >= 380 && wavelength <= 780) ? 1.0 : 0;
            return {
                r: Math.round(r * 255),
                g: Math.round(g * 255),
                b: Math.round(b * 255),
                rgbaStr: `rgba(${Math.round(r*255)}, ${Math.round(g*255)}, ${Math.round(b*255)}, ${alpha})`
            };
        }

        function drawSimulation() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const lambda = parseFloat(wlInput.value); 
            const d = parseFloat(dInput.value); 
            const L = parseFloat(LInput.value); 

            lambdaVal.innerText = lambda;
            dVal.innerText = d;
            LVal.innerText = L.toFixed(1);

            const dyReal = (lambda * 1e-9 * L) / (d * 1e-6); 
            dyVal.innerText = (dyReal * 1000).toFixed(3); 
            freqVal.innerText = (3e8 / (lambda * 1e-9) / 1e12).toFixed(1);

            const colorObj = wavelengthToRGB(lambda);
            const slitX = 140;
            const screenX = 460;
            const centerY = canvas.height / 2;
            const slitDisplayOffset = d * 0.8; 

            // 1. Laser & Slit
            ctx.fillStyle = colorObj.rgbaStr;
            ctx.fillRect(0, centerY - 20, slitX, 40);
            ctx.fillStyle = "#444";
            ctx.fillRect(slitX, 0, 12, canvas.height);
            ctx.clearRect(slitX - 1, centerY - slitDisplayOffset - 4, 14, 8);
            ctx.clearRect(slitX - 1, centerY + slitDisplayOffset - 4, 14, 8);

            if (!isPaused) time += speedMultiplier;

            // 2. Waves
            ctx.save();
            ctx.beginPath();
            ctx.rect(slitX + 12, 0, screenX - slitX - 12, canvas.height);
            ctx.clip();
            for (let r = 5; r < 340; r += 16) {
                let waveIntensity = (1 + Math.sin(r * 0.15 - time)) * 0.4;
                ctx.strokeStyle = `rgba(${colorObj.r}, ${colorObj.g}, ${colorObj.b}, ${waveIntensity})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.arc(slitX + 12, centerY - slitDisplayOffset, r, -Math.PI/2.2, Math.PI/2.2);
                ctx.stroke();
                ctx.beginPath();
                ctx.arc(slitX + 12, centerY + slitDisplayOffset, r, -Math.PI/2.2, Math.PI/2.2);
                ctx.stroke();
            }
            ctx.restore();

            // 3. Screen Patterns
            ctx.fillStyle = "#050505";
            ctx.fillRect(screenX, 0, canvas.width - screenX, canvas.height);
            const visualScaleFactor = (d / (lambda * L)) * 140; 

            for (let y = 0; y < canvas.height; y++) {
                const yOffset = y - centerY;
                const phase = yOffset * visualScaleFactor * 0.01;
                const intensity = Math.pow(Math.cos(phase), 2) * Math.exp(-Math.pow(yOffset / 180, 2));

                ctx.fillStyle = `rgba(${colorObj.r}, ${colorObj.g}, ${colorObj.b}, 0.4)`;
                ctx.fillRect(screenX + 10, y, intensity * 100, 1);
                ctx.fillStyle = `rgba(${colorObj.r}, ${colorObj.g}, ${colorObj.b}, ${intensity})`;
                ctx.fillRect(canvas.width - 100, y, 100, 1);
            }

            ctx.strokeStyle = "#fff";
            ctx.beginPath(); ctx.moveTo(screenX, 0); ctx.lineTo(screenX, canvas.height); ctx.stroke();

            requestAnimationFrame(drawSimulation);
        }

        wlInput.addEventListener('input', drawSimulation);
        dInput.addEventListener('input', drawSimulation);
        LInput.addEventListener('input', drawSimulation);
        drawSimulation();
    </script>
</body>
</html>
