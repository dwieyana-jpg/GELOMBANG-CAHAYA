<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simulasi Pemantulan Senter Pro</title>
    <style>
        :root {
            --bg: #05050a;
            --panel: rgba(15, 15, 25, 0.95);
            --laser-in: #40ff00;
            --laser-out: #40ff00;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        #canvasContainer {
            flex: 1;
            position: relative;
            touch-action: none;
            cursor: move;
        }

        canvas { display: block; }

        .ui-panel {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 350px;
            background: var(--panel);
            backdrop-filter: blur(15px);
            padding: 15px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none;
        }

        .data-grid { display: flex; justify-content: space-around; text-align: center; }
        .label { font-size: 0.6rem; color: #888; letter-spacing: 1px; margin-bottom: 3px; }
        .value { font-size: 1.2rem; font-weight: 800; font-family: 'Courier New', Courier, monospace; color: var(--laser-in); }
        
        .hint {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

<div class="hint">Geser Lampu Senter untuk Mengubah Sudut</div>

<div id="canvasContainer">
    <canvas id="mirrorCanvas"></canvas>
</div>

<div class="ui-panel">
    <div class="data-grid">
        <div>
            <div class="label">SUDUT DATANG (i)</div>
            <div id="angleI" class="value">0°</div>
        </div>
        <div>
            <div class="label">SUDUT PANTUL (r)</div>
            <div id="angleR" class="value">0°</div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('mirrorCanvas');
    const ctx = canvas.getContext('2d');
    const angleIDisplay = document.getElementById('angleI');
    const angleRDisplay = document.getElementById('angleR');

    const flashlightImg = new Image();
    flashlightImg.src = 'lampu.png'; 

    let width, height, inputX, inputY;

    function init() {
        resize();
        inputX = width * 0.15;
        inputY = height * 0.15;
        animate();
    }

    function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
    }

    function handleInput(e) {
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        if (clientY < height / 2) {
            inputX = clientX;
            inputY = clientY;
        }
    }

    window.addEventListener('mousemove', handleInput);
    window.addEventListener('touchmove', (e) => { e.preventDefault(); handleInput(e); }, {passive: false});
    window.addEventListener('resize', resize);

    function animate() {
        ctx.clearRect(0, 0, width, height);
        const centerX = width / 2;
        const centerY = height / 2;

        // 1. Gambar Cermin
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, centerY, width, height/2);
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#fff';
        ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(width, centerY); ctx.stroke();

        // 2. Garis Normal
        ctx.setLineDash([5, 10]);
        ctx.strokeStyle = 'rgba(255,255,255,0.2)';
        ctx.beginPath(); ctx.moveTo(centerX, 20); ctx.lineTo(centerX, centerY); ctx.stroke();
        ctx.setLineDash([]);

        // 3. Hitung Sudut
        const dx = inputX - centerX;
        const dy = inputY - centerY;
        const thetaRad = Math.atan2(dx, -dy);
        const thetaDeg = Math.abs(thetaRad * 180 / Math.PI);
        
        angleIDisplay.innerText = thetaDeg.toFixed(1) + "°";
        angleRDisplay.innerText = thetaDeg.toFixed(1) + "°";

        // 4. Gambar Busur Sudut (Arc) - REVISI DISINI
        ctx.lineWidth = 2;
        ctx.setLineDash([]);
        
        // Busur i
        ctx.strokeStyle = 'rgba(64, 255, 0, 0.5)';
        ctx.beginPath();
        ctx.arc(centerX, centerY, 60, -Math.PI/2, -Math.PI/2 + thetaRad, dx < 0);
        ctx.stroke();

        // Busur r
        ctx.beginPath();
        ctx.arc(centerX, centerY, 60, -Math.PI/2, -Math.PI/2 - thetaRad, dx > 0);
        ctx.stroke();

        // 5. Gambar Sinar
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#40ff00';
        ctx.strokeStyle = '#40ff00';
        ctx.lineWidth = 3;
        ctx.beginPath(); ctx.moveTo(inputX, inputY); ctx.lineTo(centerX, centerY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(centerX, centerY); ctx.lineTo(centerX - dx, inputY); ctx.stroke();
        ctx.shadowBlur = 0;

        // 6. Label i / r
        ctx.fillStyle = "white";
        ctx.font = "bold 18px Inter";
        const dist = 90;
        ctx.fillText("i", centerX + Math.sin(thetaRad/2) * dist - 5, centerY - Math.cos(thetaRad/2) * dist);
        ctx.fillText("r", centerX - Math.sin(thetaRad/2) * dist - 5, centerY - Math.cos(thetaRad/2) * dist);

        // 7. Gambar Senter (W40 H100)
        ctx.save();
        ctx.translate(inputX, inputY);
        ctx.rotate(thetaRad + Math.PI); 
        const imgW = 20; 
        const imgH = 60;
        ctx.drawImage(flashlightImg, -imgW/2, -imgH/2, imgW, imgH);
        ctx.restore();

        // Titik Pantul
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(centerX, centerY, 4, 0, Math.PI*2); ctx.fill();

        requestAnimationFrame(animate);
    }

    init();
</script>
</body>
</html>
